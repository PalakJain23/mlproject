<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <div class="left">

        <h1>🎓 Student Performance Predictor</h1>
        <p>
            Predict your Mathematics Score using Machine Learning.
            Fill in the details below to get instant results.
        </p>

        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">

    </div>

    <div class="right">

        <h2>Student Details</h2>

        <form action="{{ url_for('predict_datapoint')}}" method="post">

            <div class="inputBox">
                <label>Gender</label>
                <select name="gender" required>
                    <option selected disabled>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="inputBox">
                <label>Race / Ethnicity</label>
                <select name="ethnicity" required>
                    <option selected disabled>Select Group</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <div class="inputBox">
                <label>Parental Education</label>
                <select name="parental_level_of_education" required>
                    <option selected disabled>Select Education</option>
                    <option value="associate's degree">Associate Degree</option>
                    <option value="bachelor's degree">Bachelor Degree</option>
                    <option value="high school">High School</option>
                    <option value="master's degree">Master Degree</option>
                    <option value="some college">Some College</option>
                    <option value="some high school">Some High School</option>
                </select>
            </div>

            <div class="inputBox">
                <label>Lunch</label>
                <select name="lunch" required>
                    <option selected disabled>Select Lunch</option>
                    <option value="standard">Standard</option>
                    <option value="free/reduced">Free/Reduced</option>
                </select>
            </div>

            <div class="inputBox">
                <label>Test Preparation</label>
                <select name="test_preparation_course" required>
                    <option selected disabled>Select</option>
                    <option value="none">None</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="inputBox">
                <label>Reading Score</label>
                <input type="number" name="reading_score" min="0" max="100" required>
            </div>

            <div class="inputBox">
                <label>Writing Score</label>
                <input type="number" name="writing_score" min="0" max="100" required>
            </div>

            <button type="submit">
                <i class="fa-solid fa-chart-line"></i>
                Predict Score
            </button>

        </form>

        {% if results %}

        <div class="result">

            <h3>Predicted Mathematics Score</h3>

            <div class="score">

                {{results}}

            </div>

        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
